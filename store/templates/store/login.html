{% extends 'store/base.html' %}
{% load static %}

{% block title %}NexusGear | Portal Login{% endblock %}

{% block content %}
<div class="auth-layout" id="login-layout-wrapper">
    <div class="auth-card" id="login-card-panel">
        <div class="auth-header">
            <h1 class="auth-title">System <span>Login</span></h1>
            <p class="auth-subtitle">Load your Nexus Operator Profile</p>
        </div>

        <form action="" method="POST" id="login-form-element">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label" for="login-email-field">Email or Username</label>
                <input type="text" name="email" placeholder="operator@nexusgear.com" class="form-control" required id="login-email-field" autofocus autocomplete="username">
            </div>

            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <label class="form-label" for="login-password-field" style="margin-bottom: 0;">Access Password</label>
                    <a href="#" class="auth-link" style="padding: 0; font-size: 12px; color: var(--color-text-muted);" onclick="window.showToast('Please contact headquarters support to reset passwords.', 'info')">Forgot Password?</a>
                </div>
                <input type="password" name="password" placeholder="••••••••••••" class="form-control" required id="login-password-field" autocomplete="current-password">
            </div>

            <label class="filter-checkbox-label" style="margin-bottom: 24px; margin-top: 10px;">
                <input type="checkbox" name="remember_me" class="filter-checkbox" id="login-remember-checkbox">
                <span>Remember my operator session</span>
            </label>

            <button type="submit" class="btn btn-cyan btn-block" id="login-submit-btn">Authorize Entry</button>
        </form>

        <div class="auth-form-footer">
            <span>New Operator? </span>
            <a href="{% url 'register' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}" id="login-register-redirect-link">Register Profile Blueprint</a>
        </div>
    </div>
</div>
{% endblock %}
